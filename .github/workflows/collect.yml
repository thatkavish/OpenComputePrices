name: Collect GPU Pricing Data

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated list of sources (empty = all)"
        required: false
        default: ""
      no_auth_only:
        description: "Only run no-auth collectors (skip browser scrapers)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  DATA_TAG: latest-data

jobs:
  # Job 1: Fast API + static HTML collectors (no Playwright needed)
  collect-api:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: .env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download existing data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download "$DATA_TAG" -p 'data.tar.gz' -D /tmp/ 2>/dev/null; then
            tar xzf /tmp/data.tar.gz -C data/
            echo "Downloaded existing data from release"
            ls -lh data/*.csv 2>/dev/null | wc -l | xargs -I{} echo "  {} CSV files"
          else
            echo "No existing release found — starting fresh"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API and scraper collectors
        env:
          SHADEFORM_API_KEY: ${{ secrets.SHADEFORM_API_KEY }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          LAMBDA_API_KEY: ${{ secrets.LAMBDA_API_KEY }}
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          TENSORDOCK_API_KEY: ${{ secrets.TENSORDOCK_API_KEY }}
          PRIMEINTELLECT_API_KEY: ${{ secrets.PRIMEINTELLECT_API_KEY }}
          DATACRUNCH_API_KEY: ${{ secrets.DATACRUNCH_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            SOURCES=$(echo "${{ github.event.inputs.sources }}" | tr ',' ' ')
            python collect.py $SOURCES
          else
            # Run all non-browser collectors (API + static scrapers + API-key)
            python collect.py --no-auth-only
            python collect.py shadeform runpod vastai lambda gcp infracost tensordock primeintellect datacrunch
          fi

      - name: Upload data to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ROW_COUNT=$(cat data/*.csv 2>/dev/null | wc -l)
          tar czf /tmp/data.tar.gz -C data/ .
          SIZE=$(du -h /tmp/data.tar.gz | cut -f1)
          echo "Data archive: ${SIZE} (${ROW_COUNT} total rows)"

          # Create release if it doesn't exist, otherwise update the asset
          if gh release view "$DATA_TAG" &>/dev/null; then
            gh release upload "$DATA_TAG" /tmp/data.tar.gz --clobber
            gh release edit "$DATA_TAG" --notes "Last updated: ${DATE} — ${ROW_COUNT} rows"
          else
            gh release create "$DATA_TAG" /tmp/data.tar.gz \
              --title "Latest GPU Pricing Data" \
              --notes "Last updated: ${DATE} — ${ROW_COUNT} rows"
          fi
          echo "API collection uploaded: ${DATE}"

  # Job 2: Playwright browser-based scrapers (needs Chromium)
  collect-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: .env
    needs: collect-api
    if: github.event.inputs.no_auth_only != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          gh release download "$DATA_TAG" -p 'data.tar.gz' -D /tmp/
          tar xzf /tmp/data.tar.gz -C data/
          echo "Downloaded data from release"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run browser-based collectors
        run: python collect.py --browser

      - name: Upload data to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ROW_COUNT=$(cat data/*.csv 2>/dev/null | wc -l)
          tar czf /tmp/data.tar.gz -C data/ .
          SIZE=$(du -h /tmp/data.tar.gz | cut -f1)
          echo "Data archive: ${SIZE} (${ROW_COUNT} total rows)"
          gh release upload "$DATA_TAG" /tmp/data.tar.gz --clobber
          gh release edit "$DATA_TAG" --notes "Last updated: ${DATE} — ${ROW_COUNT} rows"
          echo "Browser collection uploaded: ${DATE}"
