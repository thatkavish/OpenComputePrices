name: Collect GPU Pricing Data

on:
  schedule:
    # Run every 12 hours (00:00, 12:00 UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated list of sources (empty = all)"
        required: false
        default: ""
      no_auth_only:
        description: "Only run no-auth collectors (skip browser scrapers)"
        required: false
        type: boolean
        default: false
      allow_fresh_start:
        description: "Allow creating data.tar.gz from scratch if the release asset is missing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  DATA_TAG: latest-data

jobs:
  # Job 1: Fast API + static HTML collectors (no Playwright needed)
  collect-api:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: .env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download existing data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_FRESH_START: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_start }}
        run: |
          mkdir -p data
          if gh release view "$DATA_TAG" >/dev/null 2>&1; then
            if ! gh release download "$DATA_TAG" -p 'data.tar.gz' -D /tmp/; then
              echo "::error::Release '$DATA_TAG' exists, but data.tar.gz could not be downloaded. Refusing to start fresh."
              exit 1
            fi
            python release_data.py extract /tmp/data.tar.gz data
            rm -f data/_latest_gpu_offers.csv
            echo "Downloaded existing data from release"
            ls -lh data/*.csv 2>/dev/null | wc -l | xargs -I{} echo "  {} CSV files"
          elif [ "$ALLOW_FRESH_START" = "true" ]; then
            echo "::warning::No '$DATA_TAG' release found; starting fresh because allow_fresh_start=true"
          else
            echo "::error::No '$DATA_TAG' release found, or GitHub could not be reached. Refusing to start fresh without allow_fresh_start=true."
            exit 1
          fi

      - name: Record baseline source offsets
        run: python release_data.py record-baseline data

      - name: Verify release baseline
        env:
          ALLOW_FRESH_START: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_start }}
          MIN_ACTIVE_HISTORY_DAYS: 75
        run: |
          if [ "$ALLOW_FRESH_START" != "true" ]; then
            python release_data.py verify-baseline data --min-sources 20 --min-days "$MIN_ACTIVE_HISTORY_DAYS"
          fi

      - name: Run API and scraper collectors
        env:
          SHADEFORM_API_KEY: ${{ secrets.SHADEFORM_API_KEY }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          LAMBDA_API_KEY: ${{ secrets.LAMBDA_API_KEY }}
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
          TENSORDOCK_API_KEY: ${{ secrets.TENSORDOCK_API_KEY }}
          PRIMEINTELLECT_API_KEY: ${{ secrets.PRIMEINTELLECT_API_KEY }}
          DATACRUNCH_API_KEY: ${{ secrets.DATACRUNCH_API_KEY }}
          COLLECT_SOURCES_CSV: ${{ github.event.inputs.sources }}
        run: |
          if [ -n "$COLLECT_SOURCES_CSV" ]; then
            if [ "${{ github.event.inputs.no_auth_only }}" = "true" ]; then
              python collect.py --no-auth-only --sources-csv "$COLLECT_SOURCES_CSV" --skip-prune --no-unify
            else
              python collect.py --no-browser --sources-csv "$COLLECT_SOURCES_CSV" --skip-prune --no-unify
            fi
          elif [ "${{ github.event.inputs.no_auth_only }}" = "true" ]; then
            python collect.py --no-auth-only --skip-prune --no-unify
          else
            # Run all non-browser collectors (API + static scrapers + API-key)
            python collect.py --no-browser --skip-prune --no-unify
          fi

      - name: Package API data artifact
        run: |
          tar czf /tmp/data-api.tar.gz -C data .
          ls -lh /tmp/data-api.tar.gz

      - name: Upload intermediate data artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-api
          path: /tmp/data-api.tar.gz
          if-no-files-found: error
          compression-level: 0

  # Job 2: Playwright browser-based scrapers (needs Chromium)
  collect-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: .env
    needs: collect-api
    if: github.event.inputs.no_auth_only != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download intermediate data artifact
        uses: actions/download-artifact@v4
        with:
          name: data-api
          path: /tmp/data-api-artifact

      - name: Extract API data artifact
        run: |
          rm -rf data
          mkdir -p data
          python release_data.py extract /tmp/data-api-artifact/data-api.tar.gz data

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run browser-based collectors
        env:
          COLLECT_SOURCES_CSV: ${{ github.event.inputs.sources }}
        run: |
          if [ -n "$COLLECT_SOURCES_CSV" ]; then
            python collect.py --browser --sources-csv "$COLLECT_SOURCES_CSV" --skip-prune --no-unify
          else
            python collect.py --browser --skip-prune --no-unify
          fi

      - name: Package browser data artifact
        run: |
          tar czf /tmp/data-browser.tar.gz -C data .
          ls -lh /tmp/data-browser.tar.gz

      - name: Upload intermediate browser data artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-browser
          path: /tmp/data-browser.tar.gz
          if-no-files-found: error
          compression-level: 0

  finalize-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - collect-api
      - collect-browser
    if: always() && needs.collect-api.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download API data artifact
        if: needs.collect-browser.result != 'success'
        uses: actions/download-artifact@v4
        with:
          name: data-api
          path: /tmp/data-api-artifact

      - name: Extract API data artifact
        if: needs.collect-browser.result != 'success'
        run: |
          rm -rf data
          mkdir -p data
          python release_data.py extract /tmp/data-api-artifact/data-api.tar.gz data

      - name: Download browser data artifact
        if: needs.collect-browser.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: data-browser
          path: /tmp/data-browser-artifact

      - name: Extract browser data artifact
        if: needs.collect-browser.result == 'success'
        run: |
          rm -rf data
          mkdir -p data
          python release_data.py extract /tmp/data-browser-artifact/data-browser.tar.gz data

      - name: Verify source data artifact
        env:
          COLLECT_SOURCES_CSV: ${{ github.event.inputs.sources }}
          ALLOW_FRESH_START: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_start }}
          MIN_ACTIVE_HISTORY_DAYS: 75
        run: |
          SOURCE_COUNT=$(find data -maxdepth 1 -type f -name '*.csv' ! -name '_*' | wc -l | tr -d ' ')
          echo "Source CSV files: ${SOURCE_COUNT}"
          MIN_SOURCE_COUNT=1
          if [ -z "$COLLECT_SOURCES_CSV" ]; then
            MIN_SOURCE_COUNT=20
          fi
          if [ "$SOURCE_COUNT" -lt "$MIN_SOURCE_COUNT" ]; then
            echo "::error::Refusing to finalize: expected at least ${MIN_SOURCE_COUNT} source CSV files, found ${SOURCE_COUNT}"
            find data -maxdepth 2 -type f | sort | head -100
            exit 1
          fi
          if [ "$ALLOW_FRESH_START" != "true" ]; then
            python release_data.py verify-baseline data --min-sources 20 --min-days "$MIN_ACTIVE_HISTORY_DAYS"
          fi

      - name: Finalize data
        run: python collect.py --finalize-only

      - name: Verify finalized data
        env:
          COLLECT_SOURCES_CSV: ${{ github.event.inputs.sources }}
          ALLOW_FRESH_START: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_start }}
          MIN_ACTIVE_HISTORY_DAYS: 75
        run: |
          SOURCE_COUNT=$(find data -maxdepth 1 -type f -name '*.csv' ! -name '_*' | wc -l | tr -d ' ')
          echo "Finalized source CSV files: ${SOURCE_COUNT}"
          MIN_SOURCE_COUNT=1
          if [ -z "$COLLECT_SOURCES_CSV" ]; then
            MIN_SOURCE_COUNT=20
          fi
          if [ "$SOURCE_COUNT" -lt "$MIN_SOURCE_COUNT" ]; then
            echo "::error::Refusing to upload release: expected at least ${MIN_SOURCE_COUNT} source CSV files, found ${SOURCE_COUNT}"
            find data -maxdepth 2 -type f | sort | head -100
            exit 1
          fi
          if [ "$ALLOW_FRESH_START" != "true" ]; then
            python release_data.py verify-active data --min-sources 20 --min-rows 1000000 --min-days "$MIN_ACTIVE_HISTORY_DAYS"
          fi

      - name: Upload data to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Upload expired rows as a separate archive (if any were pruned)
          if [ -f data/_expired.csv ] && [ -s data/_expired.csv ]; then
            mkdir -p /tmp/expired-archives /tmp/existing-archives
            python release_data.py split-expired data/_expired.csv /tmp/expired-archives
            for ARCHIVE in /tmp/expired-archives/archive_*.csv.gz; do
              [ -e "$ARCHIVE" ] || continue
              BASENAME=$(basename "$ARCHIVE")
              EXISTING="/tmp/existing-archives/${BASENAME}"
              if gh release download "$DATA_TAG" -p "$BASENAME" -D /tmp/existing-archives 2>/dev/null; then
                python release_data.py merge-archive "$EXISTING" "$ARCHIVE" "$ARCHIVE"
              fi
              ARCH_SIZE=$(du -h "$ARCHIVE" | cut -f1)
              echo "Uploading expired archive: ${BASENAME} (${ARCH_SIZE})"
              gh release upload "$DATA_TAG" "$ARCHIVE" --clobber
            done
            rm data/_expired.csv
          fi

          ROW_COUNT=$(cat data/*.csv 2>/dev/null | grep -cv '^snapshot_date' || echo 0)
          tar czf /tmp/data.tar.gz --exclude='_expired.csv' -C data/ .
          SIZE=$(du -h /tmp/data.tar.gz | cut -f1)
          echo "Data archive: ${SIZE} (${ROW_COUNT} rows)"
          TITLE="GPU Pricing Data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          if gh release view "$DATA_TAG" &>/dev/null; then
            gh release upload "$DATA_TAG" /tmp/data.tar.gz --clobber
            gh release edit "$DATA_TAG" --title "${TITLE}" --notes "Last updated: ${DATE} — ${ROW_COUNT} rows"
          else
            gh release create "$DATA_TAG" /tmp/data.tar.gz \
              --title "${TITLE}" \
              --notes "Last updated: ${DATE} — ${ROW_COUNT} rows"
          fi
          echo "Finalized collection uploaded: ${DATE}"
