name: Collect GPU Pricing Data

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated list of sources (empty = all)"
        required: false
        default: ""
      no_auth_only:
        description: "Only run no-auth collectors (skip browser scrapers)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # Job 1: Fast API + static HTML collectors (no Playwright needed)
  collect-api:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API and scraper collectors
        env:
          SHADEFORM_API_KEY: ${{ secrets.SHADEFORM_API_KEY }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          LAMBDA_API_KEY: ${{ secrets.LAMBDA_API_KEY }}
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          TENSORDOCK_API_KEY: ${{ secrets.TENSORDOCK_API_KEY }}
          PRIMEINTELLECT_API_KEY: ${{ secrets.PRIMEINTELLECT_API_KEY }}
          DATACRUNCH_API_KEY: ${{ secrets.DATACRUNCH_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            SOURCES=$(echo "${{ github.event.inputs.sources }}" | tr ',' ' ')
            python collect.py $SOURCES
          else
            # Run all non-browser collectors (API + static scrapers + API-key)
            python collect.py --no-auth-only
            python collect.py shadeform runpod vastai lambda gcp infracost tensordock primeintellect datacrunch
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            ROW_COUNT=$(wc -l data/*.csv 2>/dev/null | tail -1 | awk '{print $1}')
            git commit -m "data: daily API collection ${DATE} (${ROW_COUNT} total rows)"
            git push
          fi

  # Job 2: Playwright browser-based scrapers (needs Chromium)
  collect-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: collect-api
    if: github.event.inputs.no_auth_only != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest data
        run: git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run browser-based collectors
        run: python collect.py --browser

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: daily browser collection ${DATE}"
            git push
          fi
